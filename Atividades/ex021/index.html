<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação de sangue</title>
</head>
<body>
    <!-- Input da data de nascimento -->
     <p>
        <label for="">Qual sua data de nascimento?</label>
        <input type="date" name="nascimento" id="nascimento">
    </p>

    <!-- Entrada - Possue alguma doença? -->
     <p>
        <label for="">Possui alguma doença?</label>
        <input type="radio" name="sick" id="inputYesSick" value="yes">
        <label for="inputYesSick">Sim</label>
        <input type="radio" name="sick" id="inputNoSick" value="no">
        <label for="inputNoSick">Não</label>
     </p>

     <!-- Entrada - Peso atual -->
      <p>
        <label for="peso">Peso atual</label>
        <input type="number" id="peso">
      </p>

      <!-- Entrada - possue tatooagem recente -->
      <p>
        <label for="">Possui tatuagem recente?</label>
        <input type="radio" name="tattoo" id="inputYesTattoo" value="yes">
        <label for="inputYesTattoo">Sim</label>
        <input type="radio" name="tattoo" id="inputNoTattoo" value="no">
        <label for="inputNoTattoo">Não</label>
     </p>

     <!-- Entrada - Medicação -->
      <p>
        <label for="">Está tomando algum medicamento?</label>
        <input type="radio" name="medicine" id="inputYesMedicine" value="yes">
        <label for="inputYesTattoo">Sim</label>
        <input type="radio" name="medicine" id="inputNoMedicine" value="no">
        <label for="inputNoTattoo">Não</label>
      </p>

      <input type="button" value="Verificar" onclick="verificar()">

      <p id="resultado"></p>
    <script src="script.js"></script>
</body>
</html>
